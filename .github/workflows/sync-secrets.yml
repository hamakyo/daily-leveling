name: Sync Cloudflare Worker Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "対象環境"
        required: true
        type: choice
        default: staging
        options:
          - test
          - staging
          - production
      mode:
        description: "実行モード"
        required: true
        type: choice
        default: dry-run
        options:
          - dry-run
          - apply

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    concurrency: sync-secrets-${{ inputs.environment }}

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync secrets
        run: |
          case "${{ inputs.mode }}" in
            dry-run)
              node scripts/sync-cloudflare-secrets.mjs --env ${{ inputs.environment }} --dry-run
              ;;
            apply)
              node scripts/sync-cloudflare-secrets.mjs --env ${{ inputs.environment }}
              ;;
            *)
              echo "Unknown mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

      - name: Check Cloudflare status
        if: ${{ inputs.mode == 'apply' }}
        run: node scripts/check-cloudflare-env.mjs --env ${{ inputs.environment }}
