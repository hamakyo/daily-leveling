"$schema" = "./node_modules/wrangler/config-schema.json"
name = "daily-leveling-local"
main = "src/worker/index.ts"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/healthz",
  "/auth/*",
  "/dashboard/*",
  "/habits",
  "/habits/*",
  "/logs",
  "/onboarding/*",
  "/settings",
  "/settings/*"
]

[env.test]
name = "daily-leveling-test"

[env.staging]
name = "daily-leveling-staging"

[env.production]
name = "daily-leveling"
