"$schema" = "./node_modules/wrangler/config-schema.json"
name = "daily-leveling-local"
main = "src/worker/index.ts"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/__e2e/*",
  "/healthz",
  "/auth/*",
  "/dashboard/*",
  "/habits",
  "/habits/*",
  "/logs",
  "/onboarding/*",
  "/settings",
  "/settings/*"
]

[env.test]
name = "daily-leveling-test"

[[env.test.hyperdrive]]
binding = "HYPERDRIVE"
id = "5d5eb906286148e18f97904118daa682"

[env.test.vars]
APP_BASE_URL = "https://daily-leveling-test.hamakyoh.workers.dev"
DEFAULT_TIMEZONE = "Asia/Tokyo"
SESSION_COOKIE_NAME = "dl_session_test"
SESSION_TTL_SECONDS = "1209600"

[env.staging]
name = "daily-leveling-staging"

[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
# Replace with the Cloudflare Hyperdrive config ID for staging before real deploy.
id = "00000000-0000-0000-0000-000000000001"

[env.staging.vars]
APP_BASE_URL = "https://daily-leveling-staging.hamakyoh.workers.dev"
DEFAULT_TIMEZONE = "Asia/Tokyo"
SESSION_COOKIE_NAME = "dl_session_staging"
SESSION_TTL_SECONDS = "1209600"

[env.production]
name = "daily-leveling"

[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
# Replace with the Cloudflare Hyperdrive config ID for production before real deploy.
id = "00000000-0000-0000-0000-000000000002"

[env.production.vars]
APP_BASE_URL = "https://daily-leveling.hamakyoh.workers.dev"
DEFAULT_TIMEZONE = "Asia/Tokyo"
SESSION_COOKIE_NAME = "dl_session"
SESSION_TTL_SECONDS = "1209600"
