"$schema" = "./node_modules/wrangler/config-schema.json"
name = "daily-leveling"
main = "src/worker/index.ts"
compatibility_date = "2026-04-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/auth/*",
  "/dashboard/*",
  "/habits",
  "/habits/*",
  "/logs",
  "/onboarding/*",
  "/settings",
  "/settings/*"
]
